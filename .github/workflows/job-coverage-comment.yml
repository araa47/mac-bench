---
name: coverage-comment

on:
    workflow_call:

jobs:
    coverage-comment:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: Download coverage artifact
              uses: actions/download-artifact@v8
              with:
                  name: coverage-report

            - name: Generate coverage comment
              uses: actions/github-script@v8
              with:
                  script: |
                      const fs = require('fs');
                      const coverage = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
                      const totals = coverage.totals;
                      const pct = totals.percent_covered.toFixed(1);

                      let badge = '🔴';
                      if (pct >= 80) badge = '🟢';
                      else if (pct >= 50) badge = '🟡';

                      let fileRows = '';
                      for (const [filePath, data] of Object.entries(coverage.files || {})) {
                        const filePct = data.summary.percent_covered.toFixed(1);
                        fileRows += `| \`${filePath}\` | ${filePct}% |\n`;
                      }

                      const body = [
                        `## ${badge} Coverage Report`,
                        '',
                        `| Metric | Value |`,
                        `|--------|-------|`,
                        `| **Total Coverage** | **${pct}%** |`,
                        `| Statements | ${totals.num_statements} |`,
                        `| Missing | ${totals.missing_lines} |`,
                        `| Excluded | ${totals.excluded_lines} |`,
                        '',
                        fileRows ? '### Per-file Coverage\n' : '',
                        fileRows ? '| File | Coverage |\n|------|----------|\n' + fileRows : '_No source files covered._',
                        '',
                        `> Coverage report from commit ${context.sha.slice(0, 7)}`
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(c =>
                        c.user.type === 'Bot' && c.body.includes('Coverage Report')
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
